<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Meine Rezepte</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='32' fill='%232d6a4f'/><path d='M20 28h24v14a4 4 0 01-4 4H24a4 4 0 01-4-4V28z' fill='%23fff'/><rect x='28' y='18' width='3' height='10' rx='1.5' fill='%23fff'/><rect x='33' y='18' width='3' height='10' rx='1.5' fill='%23fff'/><rect x='16' y='27' width='32' height='4' rx='2' fill='%23fff'/><rect x='29' y='42' width='6' height='5' rx='1' fill='%23fff'/><rect x='24' y='46' width='16' height='3' rx='1.5' fill='%23fff'/></svg>">
<style>
:root {
  --gd: #1b4332; --gm: #2d6a4f; --gl: #52b788; --gp: #d8f3dc;
  --bd: #6b3d14; --bm: #a0522d; --bl: #d4956a; --bp: #fdf0e0;
  --bg: #f8f9fa; --sf: #fff; --tx: #1a1a1a; --mu: #6c757d;
  --br: #dee2e6; --r: 14px; --tt: 52px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--tx); min-height: 100vh; max-width: 600px; margin: 0 auto; }

.app-header { background: var(--gd); color: #fff; padding: 16px 20px 14px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.app-header h1 { font-size: 1.2rem; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 8px; }
.header-btns { display: flex; gap: 8px; flex-shrink: 0; }
.icon-btn { background: rgba(255,255,255,.15); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 1.25rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
.icon-btn:active { background: rgba(255,255,255,.35); }
.icon-btn.hidden { display: none !important; }

#search-screen { padding: 20px 16px; }
.search-box { position: relative; margin-bottom: 16px; }
.search-box input { width: 100%; padding: 14px 48px 14px 16px; font-size: 1rem; border: 2px solid var(--br); border-radius: var(--r); background: var(--sf); color: var(--tx); outline: none; transition: border-color .2s; }
.search-box input:focus { border-color: var(--gl); }
.clear-btn { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--mu); display: none; }

.category-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.cat-tab { flex: 1; padding: 10px 6px; border: 2px solid var(--br); background: var(--sf); border-radius: 10px; font-size: .88rem; font-weight: 600; cursor: pointer; transition: all .2s; text-align: center; }
.cat-tab.active { border-color: var(--gm); background: var(--gm); color: #fff; }
.cat-tab.active-sweet { border-color: var(--bm); background: var(--bm); color: #fff; }

.recipe-list { display: flex; flex-direction: column; gap: 8px; }
.recipe-card { background: var(--sf); border-radius: var(--r); padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.08); cursor: pointer; display: flex; align-items: center; justify-content: space-between; min-height: var(--tt); border-left: 5px solid var(--gl); transition: transform .1s; }
.recipe-card.sweet { border-left-color: var(--bl); }
.recipe-card:active { transform: scale(.98); }
.recipe-card-name { font-size: 1rem; font-weight: 600; }
.cat-badge { font-size: .75rem; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; margin-left: 8px; flex-shrink: 0; }
.cat-badge.herzhaft { background: var(--gp); color: var(--gd); }
.cat-badge.suess { background: var(--bp); color: var(--bd); }

#recipe-screen { display: none; padding-bottom: 40px; }
.recipe-hero { padding: 20px 16px 16px; background: var(--sf); border-bottom: 1px solid var(--br); }
.recipe-hero h2 { font-size: 1.35rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
.recipe-hero .badge-row { margin-bottom: 14px; }
.hero-badge { font-size: .78rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
.hero-badge.herzhaft { background: var(--gp); color: var(--gd); }
.hero-badge.suess { background: var(--bp); color: var(--bd); }
.progress-wrap { background: var(--br); border-radius: 20px; height: 10px; overflow: hidden; margin-bottom: 4px; }
.progress-fill { height: 100%; border-radius: 20px; transition: width .4s ease; background: var(--gl); width: 0%; }
.progress-fill.sweet { background: var(--bl); }
.progress-label { font-size: .8rem; color: var(--mu); text-align: right; }
.reset-btn { margin-top: 14px; width: 100%; padding: 12px; background: var(--bg); border: 2px solid var(--br); border-radius: 10px; font-size: .9rem; font-weight: 600; cursor: pointer; color: var(--mu); }
.reset-btn:active { background: var(--br); }

.section-label { font-size: .82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--mu); padding: 18px 16px 8px; }
.sep-label { font-size: .82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--mu); padding: 12px 16px 6px; background: var(--bg); border-top: 1px solid var(--br); }

.item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: var(--sf); border-bottom: 1px solid var(--br); cursor: pointer; min-height: var(--tt); user-select: none; }
.item:last-child { border-bottom: none; }
.item:active { background: #f0f0f0; }
.item-check { width: 28px; height: 28px; flex-shrink: 0; border-radius: 50%; border: 2.5px solid var(--gl); display: flex; align-items: center; justify-content: center; font-size: .85rem; margin-top: 1px; transition: all .2s; background: #fff; font-weight: 700; color: var(--mu); }
.item-check.sweet { border-color: var(--bl); }
.item.done .item-check { background: var(--gl); border-color: var(--gl); color: #fff; }
.item.done .item-check.sweet { background: var(--bl); border-color: var(--bl); }
.item.done.strikethrough .item-text { text-decoration: line-through; color: var(--mu); opacity: .7; }
.item.done.disappear { display: none !important; }
.item-body { flex: 1; min-width: 0; }
.item-text { font-size: .97rem; line-height: 1.45; }

.timer-btn { display: inline-flex; align-items: center; gap: 5px; margin-top: 6px; padding: 5px 12px; background: var(--gp); border: none; border-radius: 20px; font-size: .82rem; font-weight: 600; color: var(--gd); cursor: pointer; }
.timer-btn.sweet { background: var(--bp); color: var(--bd); }
.timer-btn.running { background: #fff3cd; color: #856404; }
.timer-btn.finished { background: #d4edda; color: #155724; }
.timer-btn:active { opacity: .8; }

#settings-panel { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.5); }
#settings-panel.open { display: flex !important; align-items: flex-end; }
.settings-sheet { background: var(--sf); border-radius: var(--r) var(--r) 0 0; width: 100%; padding: 24px 20px 40px; box-shadow: 0 -4px 24px rgba(0,0,0,.15); }
.settings-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--br); }
.settings-row label { font-size: .97rem; font-weight: 500; }
.settings-row select { padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--br); font-size: .9rem; background: var(--bg); color: var(--tx); }
.settings-close { width: 100%; margin-top: 20px; padding: 14px; background: var(--gm); color: #fff; border: none; border-radius: var(--r); font-size: 1rem; font-weight: 700; cursor: pointer; }
.empty-state { text-align: center; padding: 48px 16px; color: var(--mu); }
.empty-emoji { font-size: 3rem; display: block; margin-bottom: 12px; }
</style>
</head>
<body>

<header class="app-header">
  <h1 id="header-title">🍳 Meine Rezepte</h1>
  <div class="header-btns">
    <button class="icon-btn hidden" id="back-btn" title="Zurück">&#8592;</button>
    <button class="icon-btn" id="settings-btn" title="Einstellungen">&#9881;</button>
  </div>
</header>

<div id="search-screen">
  <div class="search-box">
    <input type="search" id="search-input" placeholder="Rezept suchen…" autocomplete="off">
    <button class="clear-btn" id="clear-btn">✕</button>
  </div>
  <div class="category-tabs">
    <button class="cat-tab active" id="tab-alle">Alle</button>
    <button class="cat-tab" id="tab-herzhaft">🥘 Herzhaft</button>
    <button class="cat-tab" id="tab-suess">🍰 Süß</button>
  </div>
  <div class="recipe-list" id="recipe-list"></div>
</div>

<div id="recipe-screen">
  <div class="recipe-hero">
    <h2 id="recipe-title">-</h2>
    <div class="badge-row"><span class="hero-badge" id="recipe-badge"></span></div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">0 von 0 erledigt</div>
    <button class="reset-btn" id="reset-btn">↺ Alle Schritte zurücksetzen</button>
  </div>
  <div class="section-label">🧺 Zutaten</div>
  <div id="zutaten-list"></div>
  <div class="section-label">👨‍🍳 Zubereitung</div>
  <div id="schritte-list"></div>
</div>

<div id="settings-panel">
  <div class="settings-sheet">
    <div class="settings-title">⚙️ Einstellungen</div>
    <div class="settings-row">
      <label for="tap-mode">Tap-Verhalten</label>
      <select id="tap-mode">
        <option value="strikethrough">Durchstreichen</option>
        <option value="disappear">Verschwinden</option>
      </select>
    </div>
    <button class="settings-close" id="settings-close">Fertig</button>
  </div>
</div>

<script>
const REZEPTE = [
{
"id": "veganer-hackbraten",
"name": "Veganer Hackbraten",
"kategorie": "herzhaft",
"zutaten": [
"1 Dose Kidneybohnen (265 g Abtropfgewicht)",
"1 Dose braune Linsen (240 g Abtropfgewicht)",
"100 g Walnusskerne",
"3–5 Knoblauchzehen",
"70 g Zwiebel (ca. 1 kleine Zwiebel)",
"150 g zarte Haferflocken",
"50 ml Sojasoße",
"35 g mittelscharfer Senf (ca. 2 EL)",
"120 g Tomatenmark (ca. 6 EL)",
"1 TL Zucker",
"1 TL Gemüsebrühepulver",
"1 TL Paprika edelsüß",
"Schwarzer Pfeffer",
"3 EL vegane BBQ-Sauce (ca. 60 g)",
"1 EL Öl (+ etwas zum Einfetten)"
],
"schritte": [
"Kidneybohnen und Linsen in ein Sieb abgießen und gut abtropfen lassen, aber nicht abspülen.",
"Knoblauchzehen schälen und mit einer Knoblauchpresse pressen.",
"Zwiebel schälen und fein würfeln (ca. 70 g).",
"Walnusskerne in der Küchenmaschine fein hacken – nicht zu Mehl, es sollen noch kleine Stückchen bleiben. Beiseite stellen.",
"BBQ-Sauce und Öl für die Glasur in einer kleinen Schüssel mit einer Gabel gut vermischen.",
"Backofen auf 180 °C Ober-/Unterhitze vorheizen.",
"Kidneybohnen, Linsen, Knoblauch, Haferflocken, Sojasoße, Senf, Tomatenmark, Zucker, Gemüsebrühepulver, Paprikapulver und Pfeffer in die Küchenmaschine geben.",
"Zu einer mittelgroben Masse verarbeiten – nicht zu feinem Mus, die Masse soll noch Textur haben.",
"Masse in eine Schüssel umfüllen, Zwiebelwürfel und gehackte Walnüsse zufügen und alles gut vermischen.",
"Eine 25-cm-Kastenform mit Öl einfetten, Hackbratenmasse einfüllen und glatt streichen.",
"Oberfläche mit der Hälfte der BBQ-Glasur bestreichen.",
"Im vorgeheizten Ofen 20 Minuten backen.",
"Braten mit der restlichen BBQ-Glasur bepinseln.",
"Weitere 20 Minuten backen.",
"Braten aus dem Ofen nehmen und 10 Minuten abkühlen lassen, dann aus der Form nehmen und anschneiden."
]
},
{
"id": "rührtofu",
"name": "Rührtofu",
"kategorie": "herzhaft",
"zutaten": [
"1 Räuchertofu",
"2 Tomaten",
"2 TL Hefeflocken",
"½ TL geräuchertes Paprikapulver",
"½ TL Kala Namak"
],
"schritte": [
"Räuchertofu mit einer Gabel oder den Händen in kleine Stücke zerkrümeln.",
"Tomaten in Würfel schneiden.",
"Tofu in einer Pfanne mit etwas Öl bei mittlerer Hitze anbraten.",
"Tomatenwürfel, Hefeflocken, Paprikapulver und Kala Namak hinzugeben und alles gut vermengen.",
"Weitere 2–3 Minuten braten, bis alles heiß und leicht gebräunt ist."
]
},
{
"id": "moussaka",
"name": "Moussaka",
"kategorie": "herzhaft",
"zutaten": [
"2 mittelgroße Auberginen (ca. 500 g)",
"2–3 EL Olivenöl zum Bestreichen",
"Salz und Pfeffer",
"4 mittelgroße Kartoffeln (ca. 500 g, geschält)",
"— Tomaten-Hack-Soße —",
"1 Packung veganes Hackfleisch",
"1 große Zwiebel, fein gewürfelt",
"4 Knoblauchzehen, gehackt",
"3 TL getrocknete Kräuter (Oregano, Thymian, Basilikum, Rosmarin)",
"2 TL Paprikapulver",
"1 Prise Zimt",
"80 ml Rotwein",
"400 g gehackte Tomaten",
"1 EL Agavensirup",
"— Béchamel-Soße —",
"150 g Cashewnüsse (eingeweicht)",
"150 ml Wasser",
"2 Knoblauchzehen",
"3 EL Hefeflocken",
"½ TL Paprikapulver",
"½ TL Salz, Prise Pfeffer, Prise Kurkuma (optional)",
"1 Handvoll veganer Reibekäse (optional)"
],
"schritte": [
"Backofen auf 200 °C Ober-/Unterhitze vorheizen und ein Backblech mit Backpapier auslegen.",
"Auberginen der Länge nach in 1,5 cm dicke Scheiben schneiden, auf das Backblech legen, mit Öl bepinseln und mit Salz bestreuen.",
"Auberginen 20 Minuten backen, bis sie weich und leicht gebräunt sind.",
"Währenddessen Wasser in einem Topf aufkochen, Kartoffeln schälen und in ½ cm dicke Scheiben schneiden.",
"Kartoffelscheiben 5–7 Minuten vorgaren, abgießen und abkühlen lassen.",
"Tomaten-Hack-Soße: 1–2 EL Olivenöl in einer Pfanne erhitzen und Zwiebel ca. 3 Minuten glasig anbraten.",
"Knoblauch und veganes Hackfleisch hinzugeben und 1 weitere Minute mitbraten.",
"Kräuter, Paprikapulver und Zimt hinzugeben, kurz mitdünsten, dann mit Rotwein ablöschen und einkochen lassen.",
"Tomaten, Agavensirup, Salz und Pfeffer hinzugeben und abgedeckt insgesamt ca. 8–10 Minuten köcheln lassen, bis die Soße dick ist. Beiseitestellen.",
"Béchamel-Soße: Cashewnüsse, Wasser, Knoblauch, Hefeflocken, Salz und Pfeffer in einen Mixer geben und cremig mixen. Beiseitestellen.",
"Backofen auf 160 °C Umluft (oder 180 °C Ober-/Unterhitze) vorheizen.",
"Boden einer 26×18 cm Auflaufform mit Olivenöl bepinseln und mit Kartoffelscheiben auslegen.",
"Die Hälfte der Auberginenscheiben darauflegen, dann die Tomaten-Hack-Soße gleichmäßig darauf verteilen.",
"Restliche Auberginenscheiben auflegen und abschließend die Cashew-Béchamel-Soße darauf verteilen.",
"Im Ofen etwa 40 Minuten backen, bis die Oberfläche leicht goldbraun ist.",
"Optional: Veganen Reibekäse darauf verteilen und weitere 5–8 Minuten backen.",
"Moussaka mindestens 30 Minuten abkühlen lassen, bevor du sie anschneidest."
]
},
{
"id": "karotten-ingwer-suppe",
"name": "Karotten-Ingwer-Suppe",
"kategorie": "herzhaft",
"zutaten": [
"1 EL Kokos- oder Olivenöl",
"1 Zwiebel, gewürfelt",
"3 Knoblauchzehen, gehackt",
"½ TL Ingwerpulver",
"3 TL gelbes Currypulver",
"1 TL Paprikapulver",
"500 g Karotten, geschält und in Stücke geschnitten",
"150 g Kartoffeln, geschält und in Stücke geschnitten",
"500 ml Gemüsebrühe",
"1 Dose Kokosmilch",
"Salz und Pfeffer",
"Zitronen- oder Limettensaft (optional)"
],
"schritte": [
"Öl in einem großen Topf bei mittlerer bis hoher Hitze erhitzen.",
"Zwiebel hinzugeben und 2–3 Minuten anbraten.",
"Knoblauch und Ingwer dazugeben und unter Rühren 1 weitere Minute anrösten.",
"Curry- und Paprikapulver hinzugeben und kurz anschwitzen.",
"Karotten und Kartoffeln hinzugeben und ebenfalls kurz anrösten.",
"Mit der Gemüsebrühe ablöschen und alles aufkochen.",
"Hitze reduzieren und abgedeckt ca. 15 Minuten köcheln lassen, bis Karotten und Kartoffeln weich sind.",
"Kokosmilch hinzugeben und mit Salz, Pfeffer und einem Spritzer Zitronen- oder Limettensaft abschmecken.",
"Suppe mit einem Pürierstab oder im Mixer cremig pürieren und nochmal abschmecken."
]
},
{
"id": "marinade-pilze",
"name": "Marinade Pilze",
"kategorie": "herzhaft",
"zutaten": [
"3 EL Öl",
"2 EL Worcestershiresoße",
"1 TL Knoblauchpulver",
"1 TL Koriander (gemahlen)",
"½ TL Rauchsalz",
"1 TL Senf"
],
"schritte": [
"Alle Zutaten in einer Schüssel gut verrühren.",
"Pilze in die Marinade geben und mindestens 30 Minuten ziehen lassen.",
"Pilze in einer heißen Pfanne oder auf dem Grill braten, bis sie goldbraun sind."
]
},
{
"id": "vegane-quiche",
"name": "Vegane Quiche",
"kategorie": "herzhaft",
"zutaten": [
"1 Packung Blätterteig",
"1 Knoblauchzehe",
"1 große Zwiebel",
"1 große Stange Porree",
"1 Packung Datteltomaten",
"200 g Cashews",
"250 ml Wasser",
"3 TL Gemüsebrühepulver"
],
"schritte": [
"Blätterteig auftauen lassen.",
"Backofen auf 200 °C Umluft vorheizen.",
"Knoblauch und Zwiebel fein schneiden und in einer Pfanne mit etwas Öl anbraten.",
"Porree in Ringe schneiden und hinzugeben, kurz mitbraten.",
"Cashews, Wasser und Gemüsebrühepulver zu einer cremigen Sahne mixen.",
"Zwiebel-Knoblauch-Porree-Mischung mit der Cashew-Sahne vermischen.",
"Blätterteig in eine Kuchenform legen und die Füllung daraufgeben.",
"Datteltomaten halbieren und auf der Quiche verteilen.",
"Bei 200 °C Umluft 25 Minuten backen."
]
},
{
"id": "chili-sin-carne",
"name": "Chili sin Carne",
"kategorie": "herzhaft",
"zutaten": [
"200 g veganes Hack",
"2 große Zwiebeln",
"3 Knoblauchzehen",
"1 Chilischote",
"1 rote Paprika",
"1 gelbe Paprika",
"1 Zucchini",
"400 ml Passata",
"1 Dose Kidneybohnen",
"1 Dose Mais",
"Olivenöl",
"1 TL Koriander (gemahlen)",
"Paprikapulver (scharf)",
"Salz"
],
"schritte": [
"Zwiebeln, Knoblauch und Chilischote fein schneiden.",
"In einem Topf mit Olivenöl und gemahlenem Koriander anschwitzen.",
"Veganes Hack hinzugeben und mitbraten.",
"Paprika und Zucchini in Würfel schneiden und hinzugeben, alles zusammen anbraten.",
"Passata dazugeben und mit Salz und scharfem Paprikapulver würzen.",
"Abgetropfte Kidneybohnen und Mais hinzugeben.",
"Alles ca. 20 Minuten bei niedriger Hitze köcheln lassen."
]
},
{
"id": "warmer-kartoffelsalat",
"name": "Warmer Kartoffelsalat",
"kategorie": "herzhaft",
"zutaten": [
"1 kg Pellkartoffeln",
"6–12 EL Essig",
"125–500 ml Gemüsebrühe",
"2 große Zwiebeln",
"200 g Räuchertofu",
"4 EL Öl",
"Salz und Pfeffer"
],
"schritte": [
"Kartoffeln in der Schale bissfest kochen, pellen und in Scheiben schneiden.",
"Kartoffelscheiben mit Essig und Gemüsebrühe übergießen.",
"Räuchertofu in einer Pfanne mit Öl knusprig ausbraten.",
"Zwiebeln in Würfel schneiden und zum Tofu geben, glasig dünsten.",
"Tofu-Zwiebel-Mischung zu den Kartoffeln geben und mit Salz und Pfeffer würzen.",
"Alles kurz aufkochen lassen und mindestens 20 Minuten ziehen lassen."
]
},
{
"id": "flammkuchen",
"name": "Flammkuchen",
"kategorie": "herzhaft",
"zutaten": [
"400 g Mehl",
"2 TL Salz",
"2 EL Öl",
"220 ml Wasser",
"400 g veganer Schmand-Ersatz (z. B. Creme Vega oder Soyananda Sauerrahm)",
"4 Zwiebeln",
"200 g Räuchertofu",
"Pfeffer"
],
"schritte": [
"Mehl, Salz, Öl und Wasser zu einem glatten Teig kneten, der nicht mehr klebt. Bei Bedarf etwas mehr Mehl einarbeiten.",
"Teig 30 Minuten ruhen lassen.",
"Schmand-Ersatz glatt rühren und mit Salz und Pfeffer würzen.",
"Zwiebeln in dünne Streifen schneiden.",
"Räuchertofu in Würfel schneiden und in einer Pfanne kurz anbraten.",
"Backofen auf 200 °C vorheizen.",
"Arbeitsfläche mit Mehl bestäuben, Teig dünn ausrollen und auf ein Backblech legen.",
"Teig mit dem Schmand-Ersatz bestreichen.",
"Zwiebeln und Räuchertofu gleichmäßig darauf verteilen.",
"Im vorgeheizten Ofen bei 200 °C ca. 20 Minuten backen."
]
},
{
"id": "braune-bratensosse",
"name": "Braune Bratensoße",
"kategorie": "herzhaft",
"zutaten": [
"1 große Zwiebel",
"1½ EL Bratöl",
"2 Prisen Salz",
"1 EL vegane Butter",
"1 Lorbeerblatt",
"2 TL Rohrohrzucker",
"1 EL Mehl (gestrichen)",
"300 ml Gemüsebrühe",
"50 ml Rotwein",
"1 EL Rotweinessig",
"1 EL Worcestershiresoße",
"½ TL mittelscharfer Senf"
],

// ── State ──────────────────────────────────────────────────────
let currentRecipe = null;
let doneItems = {};
let activeTimers = {};
let settings = { tapMode: 'strikethrough' };
let activeCategory = 'alle';

// ── Init ───────────────────────────────────────────────────────
function init() {
  try {
    const s = localStorage.getItem('rz_settings');
    if (s) settings = Object.assign(settings, JSON.parse(s));
  } catch(e) {}
  document.getElementById('tap-mode').value = settings.tapMode;

  // Event listeners
  document.getElementById('search-input').addEventListener('input', filterRecipes);
  document.getElementById('clear-btn').addEventListener('click', clearSearch);
  document.getElementById('back-btn').addEventListener('click', showSearch);
  document.getElementById('settings-btn').addEventListener('click', openSettings);
  document.getElementById('settings-close').addEventListener('click', closeSettings);
  document.getElementById('reset-btn').addEventListener('click', resetRecipe);
  document.getElementById('tap-mode').addEventListener('change', function() {
    settings.tapMode = this.value;
    try { localStorage.setItem('rz_settings', JSON.stringify(settings)); } catch(e) {}
    if (currentRecipe) renderRecipe(currentRecipe);
  });
  document.getElementById('settings-panel').addEventListener('click', function(e) {
    if (e.target === this) closeSettings();
  });

  // Category tabs
  document.getElementById('tab-alle').addEventListener('click', function() { setCategory('alle', this); });
  document.getElementById('tab-herzhaft').addEventListener('click', function() { setCategory('herzhaft', this); });
  document.getElementById('tab-suess').addEventListener('click', function() { setCategory('suess', this); });

  renderList(REZEPTE);
}

// ── Search ──────────────────────────────────────────────────────
function setCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.cat-tab').forEach(function(b) {
    b.classList.remove('active', 'active-sweet');
  });
  if (cat === 'suess') btn.classList.add('active-sweet');
  else btn.classList.add('active');
  filterRecipes();
}

function filterRecipes() {
  var q = document.getElementById('search-input').value.toLowerCase().trim();
  document.getElementById('clear-btn').style.display = q ? 'block' : 'none';
  var filtered = REZEPTE.filter(function(r) {
    var catMatch = activeCategory === 'alle' ||
      (activeCategory === 'herzhaft' && r.kategorie === 'herzhaft') ||
      (activeCategory === 'suess' && r.kategorie === 'süß');
    var textMatch = !q || r.name.toLowerCase().indexOf(q) !== -1;
    return catMatch && textMatch;
  });
  renderList(filtered);
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  filterRecipes();
}

// ── Render list ────────────────────────────────────────────────
function renderList(list) {
  var el = document.getElementById('recipe-list');
  if (!list || list.length === 0) {
    el.innerHTML = '<div class="empty-state"><span class="empty-emoji">🔍</span>Kein Rezept gefunden</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var r = list[i];
    var isSweet = r.kategorie === 'süß';
    html += '<div class="recipe-card ' + (isSweet ? 'sweet' : '') + '" data-id="' + r.id + '">';
    html += '<span class="recipe-card-name">' + escHtml(r.name) + '</span>';
    html += '<span class="cat-badge ' + (isSweet ? 'suess' : 'herzhaft') + '">' + (isSweet ? '🍰 Süß' : '🥘 Herzhaft') + '</span>';
    html += '</div>';
  }
  el.innerHTML = html;
  el.querySelectorAll('.recipe-card').forEach(function(card) {
    card.addEventListener('click', function() {
      openRecipe(this.dataset.id);
    });
  });
}

// ── Recipe view ────────────────────────────────────────────────
function openRecipe(id) {
  currentRecipe = null;
  for (var i = 0; i < REZEPTE.length; i++) {
    if (REZEPTE[i].id === id) { currentRecipe = REZEPTE[i]; break; }
  }
  if (!currentRecipe) return;
  doneItems = {};
  stopAllTimers();

  document.getElementById('search-screen').style.display = 'none';
  document.getElementById('recipe-screen').style.display = 'block';
  document.getElementById('back-btn').classList.remove('hidden');
  document.getElementById('header-title').textContent = '🍳 ' + currentRecipe.name;
  renderRecipe(currentRecipe);
}

function showSearch() {
  stopAllTimers();
  currentRecipe = null;
  doneItems = {};
  document.getElementById('recipe-screen').style.display = 'none';
  document.getElementById('search-screen').style.display = 'block';
  document.getElementById('back-btn').classList.add('hidden');
  document.getElementById('header-title').textContent = '🍳 Meine Rezepte';
}

function renderRecipe(r) {
  var isSweet = r.kategorie === 'süß';
  document.getElementById('recipe-title').textContent = r.name;
  var badge = document.getElementById('recipe-badge');
  badge.textContent = isSweet ? '🍰 Süß' : '🥘 Herzhaft';
  badge.className = 'hero-badge ' + (isSweet ? 'suess' : 'herzhaft');
  var fill = document.getElementById('progress-fill');
  fill.className = 'progress-fill' + (isSweet ? ' sweet' : '');
  updateProgress();

  // Zutaten
  var zHtml = '';
  for (var i = 0; i < r.zutaten.length; i++) {
    var z = r.zutaten[i];
    if (z.startsWith('—') || z.startsWith('---')) {
      zHtml += '<div class="sep-label">' + escHtml(z) + '</div>';
      continue;
    }
    var key = 'z-' + i;
    var isDone = !!doneItems[key];
    zHtml += '<div class="item ' + (isDone ? 'done ' + settings.tapMode : '') + '" data-key="' + key + '">';
    zHtml += '<div class="item-check' + (isSweet ? ' sweet' : '') + '">' + (isDone ? '✓' : '') + '</div>';
    zHtml += '<div class="item-body"><div class="item-text">' + escHtml(z) + '</div></div>';
    zHtml += '</div>';
  }
  var zList = document.getElementById('zutaten-list');
  zList.innerHTML = zHtml;
  zList.querySelectorAll('.item').forEach(function(el) {
    el.addEventListener('click', function() { toggleItem(this.dataset.key); });
  });

  // Schritte
  var sHtml = '';
  for (var j = 0; j < r.schritte.length; j++) {
    var s = r.schritte[j];
    var skey = 's-' + j;
    var sDone = !!doneItems[skey];
    var timerHtml = buildTimers(s, skey, isSweet);
    sHtml += '<div class="item ' + (sDone ? 'done ' + settings.tapMode : '') + '" data-key="' + skey + '">';
    sHtml += '<div class="item-check' + (isSweet ? ' sweet' : '') + '">' + (sDone ? '✓' : (j + 1)) + '</div>';
    sHtml += '<div class="item-body"><div class="item-text">' + escHtml(s) + '</div>' + timerHtml + '</div>';
    sHtml += '</div>';
  }
  var sList = document.getElementById('schritte-list');
  sList.innerHTML = sHtml;
  sList.querySelectorAll('.item').forEach(function(el) {
    el.addEventListener('click', function() { toggleItem(this.dataset.key); });
  });
  sList.querySelectorAll('.timer-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      startTimer(this.dataset.timerkey, parseInt(this.dataset.seconds), this);
    });
  });
}

function toggleItem(key) {
  doneItems[key] = !doneItems[key];
  var el = document.querySelector('[data-key="' + key + '"]');
  if (!el) return;
  var check = el.querySelector('.item-check');
  var isStep = key.charAt(0) === 's';
  var idx = parseInt(key.split('-')[1]);
  if (doneItems[key]) {
    el.classList.add('done', settings.tapMode);
    check.textContent = '✓';
  } else {
    el.classList.remove('done', 'strikethrough', 'disappear');
    check.textContent = isStep ? (idx + 1) : '';
  }
  updateProgress();
}

function resetRecipe() {
  doneItems = {};
  stopAllTimers();
  renderRecipe(currentRecipe);
}

function updateProgress() {
  if (!currentRecipe) return;
  var total = currentRecipe.schritte.length;
  var done = 0;
  for (var k in doneItems) { if (k.charAt(0) === 's' && doneItems[k]) done++; }
  var pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = done + ' von ' + total + ' Schritten erledigt (' + pct + '%)';
}

// ── Timer ──────────────────────────────────────────────────────
function buildTimers(text, key, isSweet) {
  var regex = /(\d+)\s*(Minuten?|Min\.|Stunden?|Std\.)/gi;
  var html = '';
  var m;
  while ((m = regex.exec(text)) !== null) {
    var amt = parseInt(m[1]);
    var unit = m[2].toLowerCase();
    var isHour = unit.indexOf('st') === 0 || unit === 'std.';
    var sec = isHour ? amt * 3600 : amt * 60;
    var tk = key + '-t' + m.index;
    var label = '⏱ ' + amt + ' ' + (isHour ? 'Std.' : 'Min.') + ' Timer';
    html += '<button class="timer-btn' + (isSweet ? ' sweet' : '') + '" data-timerkey="' + tk + '" data-seconds="' + sec + '" data-orig="' + escAttr(label) + '">' + label + '</button> ';
  }
  return html;
}

function startTimer(tk, totalSec, btn) {
  if (activeTimers[tk]) {
    clearInterval(activeTimers[tk]);
    delete activeTimers[tk];
    btn.classList.remove('running', 'finished');
    btn.textContent = btn.dataset.orig;
    return;
  }
  var rem = totalSec;
  btn.classList.add('running');
  function tick() {
    rem--;
    if (rem <= 0) {
      clearInterval(activeTimers[tk]);
      delete activeTimers[tk];
      btn.classList.remove('running');
      btn.classList.add('finished');
      btn.textContent = '✅ Fertig!';
      if ('vibrate' in navigator) navigator.vibrate([300, 100, 300]);
      return;
    }
    var mm = Math.floor(rem / 60);
    var ss = rem % 60;
    btn.textContent = '⏱ ' + mm + ':' + (ss < 10 ? '0' : '') + ss + ' – Stopp';
  }
  tick();
  activeTimers[tk] = setInterval(tick, 1000);
}

function stopAllTimers() {
  for (var tk in activeTimers) clearInterval(activeTimers[tk]);
  activeTimers = {};
}

// ── Settings ───────────────────────────────────────────────────
function openSettings() {
  document.getElementById('settings-panel').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-panel').classList.remove('open');
}

// ── Helpers ────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return s.replace(/"/g,'&quot;');
}

// ── Service Worker ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  try {
    var swCode = "const C='rz-v1';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});";
    var blob = new Blob([swCode], {type: 'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob));
  } catch(e) {}
}

init();
